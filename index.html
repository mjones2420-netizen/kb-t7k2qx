<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="EMOM" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>EMOM Timer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <!-- Setup screen -->
    <section id="setup" class="screen active">
      <h1>EMOM</h1>
      <p class="tagline">Every Minute On the Minute</p>

      <label class="field">
        <span>Reps each minute</span>
        <input id="reps" type="number" inputmode="numeric" min="1" value="10" />
      </label>

      <label class="field">
        <span>Total minutes</span>
        <input id="minutes" type="number" inputmode="numeric" min="1" value="10" />
      </label>

      <button id="startBtn" class="btn primary">Start</button>
    </section>

    <!-- Running screen -->
    <section id="running" class="screen">
      <div class="round">Minute <span id="roundNow">1</span> / <span id="roundTotal">10</span></div>

      <div id="countdown" class="countdown">60</div>

      <div class="stats">
        <div class="stat">
          <span class="stat-num" id="totalReps">0</span>
          <span class="stat-label">reps done</span>
        </div>
        <div class="stat">
          <span class="stat-num" id="repTarget">10</span>
          <span class="stat-label">per minute</span>
        </div>
      </div>

      <div class="controls">
        <button id="pauseBtn" class="btn">Pause</button>
        <button id="resetBtn" class="btn ghost">Reset</button>
      </div>
    </section>

    <!-- Done screen -->
    <section id="done" class="screen">
      <h1>Done!</h1>
      <div class="stat big">
        <span class="stat-num" id="finalReps">0</span>
        <span class="stat-label">total reps</span>
      </div>
      <button id="againBtn" class="btn primary">Go again</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
